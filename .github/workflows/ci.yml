name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Integration test — scaffold TS server
        run: |
          node dist/index.js new test-ts-server --lang typescript --template file-tool --out /tmp
          node dist/index.js test /tmp/test-ts-server
      - name: Integration test — scaffold Python server
        run: |
          node dist/index.js new test-py-server --lang python --template read-only-api --out /tmp
          node dist/index.js test /tmp/test-py-server
